schema_version: 1
id: top-k-heavy-hitters
title: Top-K 与高频项统计
primary_family: feed-social-ranking
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - consistency-ordering-time
  - cache-index-amplification
  - async-backpressure-fairness
  - failure-recovery-disaster
