claims:
  - id: ad-serving-ranking-budget-reservation-is-authoritative-while-auction-score-is-derived
    statement: 竞价分只能在已通过政策、频控和预算保留的候选中排序，最高分本身不授予花费权。
  - id: ad-serving-ranking-cannot-simultaneously-use-stale-edge-budget-and-guarantee-no-overspend
    statement: 多个边缘依据陈旧余额独立获胜时无法同时保证零超支，必须协调保留、限制租约或接受明确误差界。
  - id: ad-serving-ranking-fairness-and-policy-constraints-are-feasibility-filters-not-score-features
    statement: 同意、地域、敏感类目和频控等硬约束必须定义可行集合，不能只作为可被高出价抵消的降权特征。
