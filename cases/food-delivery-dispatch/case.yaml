schema_version: 1
id: food-delivery-dispatch
title: 外卖配送调度
primary_family: search-crawl-geo
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - placement-routing-sharding
  - consistency-ordering-time
  - concurrency-transactions-idempotency
  - cache-index-amplification
  - async-backpressure-fairness
  - failure-recovery-disaster
  - observability-release-evolution
  - security-privacy-multitenancy
claims:
  - id: food-delivery-dispatch-nearest-courier-is-not-earliest-delivery
    statement: 外卖完成时间同时受备餐、取餐等待和后续停靠约束，距离餐厅最近的骑手不等于最早交付。
  - id: food-delivery-dispatch-insertion-must-validate-whole-plan
    statement: 新订单插入多单路线时必须重新验证整条停靠序列的容量和时间窗，局部增量最短不能证明既有承诺不被击穿。
  - id: food-delivery-dispatch-assignment-needs-order-owner
    statement: order owner 的 reservation/version CAS 必须是唯一分配决策，courier plan 只能用同一 token/version 做 propose 与 commit，否则跨 owner 并发会产生双分配或幽灵容量。
