schema_version: 1
id: payment-system
title: 支付系统
primary_family: transactions-contention
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - consistency-ordering-time
  - concurrency-transactions-idempotency
  - async-backpressure-fairness
  - failure-recovery-disaster
  - observability-release-evolution
  - security-privacy-multitenancy
claims:
  - id: payment-system-timeout-cannot-distinguish-unsubmitted-from-processed-capture
    statement: 外部 attempt 发出后响应丢失必须令同一逻辑 capture 进入 UNKNOWN，而非退回 CAPTURE_PENDING，并以稳定 reference 查询后单调收敛。
  - id: payment-system-authorization-capture-and-settlement-are-distinct-promises
    statement: 授权、捕获与结算是不同承诺，必须以不同状态对订单、用户和财务表达。
  - id: payment-system-reconciliation-is-a-correctness-path-not-a-reporting-job
    statement: 同步结果不确定时，外部参考号、回调和批量对账是状态收敛的正确性路径。
