schema_version: 1
id: video-conferencing
title: 视频会议
primary_family: realtime-collaboration
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - placement-routing-sharding
  - consistency-ordering-time
  - cache-index-amplification
  - async-backpressure-fairness
