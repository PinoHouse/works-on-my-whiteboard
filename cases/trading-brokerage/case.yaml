schema_version: 1
id: trading-brokerage
title: 证券交易与经纪系统
primary_family: transactions-contention
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - placement-routing-sharding
  - consistency-ordering-time
  - concurrency-transactions-idempotency
  - async-backpressure-fairness
  - failure-recovery-disaster
  - observability-release-evolution
  - security-privacy-multitenancy
claims:
  - id: trading-brokerage-order-acceptance-is-not-execution
    statement: 经纪商受理并完成风控只承诺处理客户订单，实际成交必须来自交易场所的权威回报。
  - id: trading-brokerage-cancel-and-fill-require-a-single-order-sequence
    statement: 撤单与成交并发时需要可证明的订单事件顺序，否则可能同时释放风险额度并确认成交。
  - id: trading-brokerage-market-data-cannot-authorize-a-guaranteed-fill
    statement: 行情是有延迟的观察值，不能替代撮合簿执行报告或授权保证成交。
