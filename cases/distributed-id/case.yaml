schema_version: 1
id: distributed-id
title: 分布式 ID 生成器
primary_family: addressing-traffic
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - consistency-ordering-time
  - concurrency-transactions-idempotency
  - failure-recovery-disaster
  - observability-release-evolution
  - security-privacy-multitenancy
claims:
  - id: distributed-id-lease-epoch-must-be-encoded-before-worker-id-reuse
    statement: worker ID 可复用时，协调器必须为每次授予分配不复用的单调 lease_epoch 并把它编码进 ID；仅在下游校验 fencing token 不能保证 NextID 响应本身全局唯一。
  - id: distributed-id-clock-regression-cannot-preserve-availability-and-monotonic-time-encoding
    statement: 当物理时钟回退且 ID 必须编码单调时间时，系统只能等待或拒绝、改用逻辑时间，或允许时间字段倒退，三者不能同时避免。
  - id: distributed-id-sequence-width-bounds-per-worker-burst-rate
    statement: 固定 sequence 位宽把单 worker、单时间片的可发号突发硬性限制为 2^s，扩机器不解决单个被错误路由的热点。
