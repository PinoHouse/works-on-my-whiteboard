schema_version: 1
id: video-on-demand
title: 视频点播
primary_family: media-delivery
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - consistency-ordering-time
  - cache-index-amplification
  - async-backpressure-fairness
  - failure-recovery-disaster
  - observability-release-evolution
  - security-privacy-multitenancy
claims:
  - id: video-on-demand-release-selection-must-bind-a-complete-client-compatible-contract
    statement: 点播 release 只有在必需资产、协议、codec、DRM scheme 与 key generation 完整后才可供选择，网关必须按客户端能力返回最新兼容版本。
  - id: video-on-demand-license-revocation-has-an-explicit-exposure-window
    statement: 撤权可阻止新 manifest、分片授权、license 与续期，却无法即时收回已签 license、已得密钥或离线字节，暴露上界由 expiry 或在线回检决定。
  - id: video-on-demand-startup-and-steady-state-throughput-are-separate-budgets
    statement: 首帧启动受清单与首批分片往返支配，稳态卡顿受持续可用吞吐与缓冲消耗支配，平均带宽不能同时代表两者。
