schema_version: 1
id: cloud-file-sync
title: 云文件同步
primary_family: distributed-storage
required: true
status: draft
dimensions:
  - problem-slo
  - capacity-cost-skew
  - contracts-data-invariants
  - consistency-ordering-time
  - concurrency-transactions-idempotency
  - cache-index-amplification
  - async-backpressure-fairness
  - failure-recovery-disaster
  - observability-release-evolution
  - security-privacy-multitenancy
claims:
  - id: cloud-file-sync-save-and-sync-acknowledgements-name-different-durability-domains
    statement: 本地持久化、云端接受操作和其他设备可见是三个不同状态，合并为一个保存成功会使断网、重试和用户期望不可解释。
  - id: cloud-file-sync-path-is-not-a-stable-file-identity-under-rename
    statement: 路径会被重命名和复用；内容 generation 与目录 entry version 必须独立，rename 不能被误解为内容编辑或推进内容版本。
  - id: cloud-file-sync-convergence-requires-preserving-concurrent-history
    statement: 设备未看见彼此操作时不存在共同顺序，从首个并发写开始就必须保留分支；冲突阈值只能控制呈现、合并和准入。
